services:
  - type: web
    name: deepface-age-server
    env: python
    buildCommand: |
      apt-get update && apt-get install -y libgl1 libglib2.0-0
      pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py wsgi:app
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: ENABLE_CACHE
        value: "true"
