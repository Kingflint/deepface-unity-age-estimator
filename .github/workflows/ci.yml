name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install OpenCV system deps
        run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0

      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          pip install Flask opencv-python-headless numpy Pillow pytest pytest-cov ruff

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: pytest --cov=deepface_server --cov-report=term-missing
